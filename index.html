<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#141c29" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <title>DungeonShift</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                background: #000;
                width: 100%;
                height: 100%;
            }
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                width: 100dvw;
                height: 100dvh;
                min-height: 100dvh;
                overflow: hidden;
                touch-action: none;
                overscroll-behavior: none;
            }
            canvas {
                display: block;
                max-width: 100dvw;
                max-height: 100dvh;
                image-rendering: pixelated;
                image-rendering: crisp-edges;
            }
        </style>
    </head>
    <body>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
